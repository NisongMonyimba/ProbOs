# =============================================================================
# .github/workflows/ci.yml
# ProbOS Continuous Integration Pipeline
#
# WHAT THIS DOES:
#   Every push or pull request to main triggers:
#   1. Fresh Ubuntu 22.04 VM
#   2. Python 3.11 + C++20 + CMake + Ninja + Google Test + pybind11
#   3. 322 Python tests (pytest) including property-based tests
#   4. mypy strict type checking (full python/ tree)
#   5. ruff lint (full python/ tree)
#   6. All Week 2-4 examples
#   7. 13 C++ tests
#   8. LaTeX manuscript compilation (13 pages)
#   9. Full integration (RunTests.sh equivalent, includes pybind11 extension)
#   10. Pre-week quality audit (coverage, hypothesis, bandit, pip-audit)
#
# WHERE TO SEE RESULTS:
#   https://github.com/NisongMonyimba/ProbOs/actions
# =============================================================================

name: ProbOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ===========================================================================
  # JOB 1: Python tests + static analysis
  # ===========================================================================
  python-tests:
    name: Python Tests (322 pytest + mypy + ruff)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install SALib matplotlib scipy pybind11 fastapi uvicorn httpx

      - name: Install C++ build tools (for probos_cpp extension)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libgtest-dev libgmock-dev

      - name: Build probos_cpp pybind11 extension
        run: |
          PYBIND11_CMAKE_DIR=$(python -m pybind11 --cmakedir)
          cmake -B cpp/build -S cpp -G Ninja -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=$(which python) -Dpybind11_DIR="$PYBIND11_CMAKE_DIR" -Wno-dev
          cmake --build cpp/build
          ls -la cpp/build/probos_cpp*.so

      - name: Run pytest (322 tests, including C++ bindings)
        run: |
          python -m pytest python/tests/ -v --tb=short --no-header
          echo "pytest exit: $?"

      - name: mypy strict type check
        run: |
          python -m mypy python/src/distributions.py python/src/state.py python/src/battery_model.py python/src/monte_carlo.py python/src/sensitivity.py python/src/provenance.py python/src/particle_filter.py python/pdsl/ python/examples/ --strict --ignore-missing-imports --explicit-package-bases --no-error-summary
          echo "mypy exit: $?"

      - name: ruff lint
        run: |
          python -m ruff check python/src/ python/pdsl/ python/tests/ python/examples/ --select E,F,W
          echo "ruff exit: $?"

      - name: Run Week 2 examples
        run: |
          python python/examples/week2_battery_ode.py

      - name: Run Week 3 examples
        run: |
          python python/examples/week3_mc_battery.py
          python python/examples/week3_clt_convergence.py
          python python/examples/week3_sobol_battery.py

      - name: Run Week 4 examples
        run: |
          python python/examples/week4_option_pricer.py
          python python/examples/week4_ed_queue.py
          python python/examples/week4_clinical_trial.py

      - name: Upload figures
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: example-figures
          path: |
            outputs/figures/week2_battery_ode.png
            outputs/figures/week3_mc_battery.png
            outputs/figures/week3_clt_convergence.png
            outputs/figures/week3_sobol_battery.png
          retention-days: 30

  # ===========================================================================
  # JOB 2: C++ build and tests
  # ===========================================================================
  cpp-tests:
    name: C++ Tests (cmake + ninja + ctest)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgtest-dev \
            libgmock-dev
          echo "g++ version: $(g++ --version | head -1)"
          echo "cmake version: $(cmake --version | head -1)"

      - name: Configure CMake (C++20)
        working-directory: cpp
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev

      - name: Build C++
        working-directory: cpp
        run: cmake --build build

      - name: Run C++ tests (13 tests)
        working-directory: cpp
        run: |
          ./build/test_normal --gtest_brief=1
          echo "C++ exit: $?"

  # ===========================================================================
  # JOB 3: LaTeX manuscript
  # ===========================================================================
  manuscript:
    name: LaTeX Manuscript (13 pages)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-science \
            texlive-pictures \
            texlive-fonts-recommended

      - name: Set up Python for figures
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate figures
        run: |
          pip install --upgrade pip -q
          pip install -e ".[dev]" -q
          pip install SALib matplotlib scipy -q
          python python/examples/week2_battery_ode.py || true
          python python/examples/week3_mc_battery.py || true
          python python/examples/week3_clt_convergence.py || true
          python python/examples/week3_sobol_battery.py || true
          cp outputs/figures/week2_battery_ode.png manuscript/ 2>/dev/null || true
          cp outputs/figures/week3_mc_battery.png manuscript/ 2>/dev/null || true
          cp outputs/figures/week3_clt_convergence.png manuscript/ 2>/dev/null || true
          cp outputs/figures/week3_sobol_battery.png manuscript/ 2>/dev/null || true

      - name: Compile manuscript
        run: |
          cd manuscript
          pdflatex -interaction=nonstopmode main.tex || true
          bibtex main || true
          pdflatex -interaction=nonstopmode main.tex || true
          pdflatex -interaction=nonstopmode main.tex
          ls -lh main.pdf

      - name: Upload manuscript PDF
        uses: actions/upload-artifact@v6
        with:
          name: manuscript-pdf
          path: manuscript/main.pdf
          retention-days: 90

  # ===========================================================================
  # JOB 4: Full integration (RunTests.sh equivalent)
  # ===========================================================================
  integration:
    name: Full Integration (322 Python + 13 C++)
    runs-on: ubuntu-22.04
    needs: [ python-tests, cpp-tests ]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgtest-dev libgmock-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install SALib matplotlib scipy pybind11 fastapi uvicorn httpx

      - name: Build C++ (including probos_cpp extension)
        run: |
          PYBIND11_CMAKE_DIR=$(python -m pybind11 --cmakedir)
          cmake -B cpp/build -S cpp -G Ninja -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=$(which python) -Dpybind11_DIR="$PYBIND11_CMAKE_DIR" -Wno-dev
          cmake --build cpp/build

      - name: Run all Python tests
        run: python -m pytest python/tests/ -q --tb=short --no-header

      - name: Run all C++ tests
        working-directory: cpp
        run: ./build/test_normal --gtest_brief=1

      - name: mypy + ruff (full tree)
        run: |
          python -m mypy python/src/ python/pdsl/ python/examples/ --strict --ignore-missing-imports --explicit-package-bases --no-error-summary
          python -m ruff check python/ --select E,F,W

      - name: Run all examples
        run: |
          python python/examples/week2_battery_ode.py
          python python/examples/week3_mc_battery.py
          python python/examples/week3_clt_convergence.py
          python python/examples/week3_sobol_battery.py
          python python/examples/week4_option_pricer.py
          python python/examples/week4_ed_queue.py
          python python/examples/week4_clinical_trial.py

      - name: Print summary
        run: |
          echo "============================================================"
          echo "  PROBOS CI -- ALL JOBS PASSED"
          echo "  Month 1 : Distribution, Model, MC, Sobol, Provenance, PDSL"
          echo "  Month 2 : ParticleFilter, pybind11 bindings"
          echo "  Total   : 322 Python + 13 C++ tests"
          echo "  mypy    : 0 errors (full python/ tree)"
          echo "  ruff    : 0 warnings (full python/ tree)"
          echo "  Coverage: >=85% on python/src + python/pdsl"
          echo "============================================================"

  # ===========================================================================
  # JOB 5: Pre-week quality audit
  # ===========================================================================
  quality-audit:
    name: Pre-Week Quality Audit (coverage, hypothesis, bandit, pip-audit)
    runs-on: ubuntu-22.04
    needs: [ python-tests, cpp-tests ]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
          .venv/bin/pip install SALib matplotlib scipy pybind11 fastapi uvicorn httpx

      - name: Install C++ build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libgtest-dev libgmock-dev

      - name: Build C++ (including probos_cpp extension, for full audit coverage)
        run: |
          PYBIND11_CMAKE_DIR=$(.venv/bin/python -m pybind11 --cmakedir)
          cmake -B cpp/build -S cpp -G Ninja -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=$(pwd)/.venv/bin/python -Dpybind11_DIR="$PYBIND11_CMAKE_DIR" -Wno-dev
          cmake --build cpp/build

      - name: Run pre_week_audit.sh
        run: bash pre_week_audit.sh
